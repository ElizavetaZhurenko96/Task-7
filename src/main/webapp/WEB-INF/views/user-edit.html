<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
</head>
<body>
<h1>Edit User</h1>

<form th:action="@{'/users/' + ${user.id}}" th:object="${user}" method="post">
    <input type="hidden" th:field="*{id}" />
    <label>Name: <input type="text" th:field="*{name}" /></label><br>
    <label>Email: <input type="email" th:field="*{email}" /></label><br>
    <label>Age: <input type="number" th:field="*{age}" /></label><br>
    <button type="submit">Update</button>
</form>

<a th:href="@{/users}">Back to List</a>
</body>
</html>
